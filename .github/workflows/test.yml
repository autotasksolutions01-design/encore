name: test

# Independent verification gate: runs on every PR to master so the result does
# not depend on the AFK worker's self-report or the local afk_verify gate.
on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Prisma 7 evaluates prisma.config.ts at load time and requires
      # DATABASE_URL even for `generate`. Generate does NOT connect to a
      # database; a dummy URL is enough to satisfy config resolution in CI.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

name: test

# Independent verification gate: runs on every PR to master so the result does
# not depend on the AFK worker's self-report or the local afk_verify gate.
on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma client is imported by parts of the suite; generate it from the
      # schema (no database connection required).
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test
